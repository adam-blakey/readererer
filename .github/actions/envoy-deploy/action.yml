name: Envoy deploy
description: >-
  Deploy the application to a server using Laravel Envoy over SSH. Mirrors the
  deploy story defined in Envoy.blade.php (git pull, npm, composer, migrate,
  optionally seed) that the project previously ran from GitLab CI.

inputs:
  ssh-private-key:
    description: Private SSH key with access to the target server (and, via agent forwarding, the git remote it pulls from).
    required: true
  unix-username:
    description: SSH user on the target server.
    required: true
  server-domain:
    description: SSH host of the target server (e.g. ssh.readererer.com).
    required: true
  server-port:
    description: SSH port of the target server.
    required: false
    default: "22"
  app-domain:
    description: Application domain Envoy uses to locate the app directory on the server (e.g. readererer.com).
    required: true
  ref:
    description: Git branch the server should reset to and deploy (Envoy runs `git reset --hard origin/<ref>`).
    required: true
  seed-database:
    description: Run the database seeder after migrating. "1" to seed, "0" to skip.
    required: false
    default: "0"

runs:
  using: composite
  steps:
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.2"
        tools: composer

    - name: Install Laravel Envoy
      shell: bash
      run: |
        composer global require laravel/envoy=~2.10 --no-interaction --prefer-dist
        echo "$(composer global config bin-dir --absolute)" >> "$GITHUB_PATH"

    - name: Deploy with Envoy
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ inputs.ssh-private-key }}
        UNIX_USERNAME: ${{ inputs.unix-username }}
        SERVER_DOMAIN: ${{ inputs.server-domain }}
        SERVER_PORT: ${{ inputs.server-port }}
        APP_DOMAIN: ${{ inputs.app-domain }}
        DEPLOY_REF: ${{ inputs.ref }}
        SEED_DATABASE: ${{ inputs.seed-database }}
      run: |
        set -euo pipefail

        # Load the deploy key into an ssh-agent so Envoy's `-A` agent
        # forwarding lets the server authenticate to the git remote.
        eval "$(ssh-agent -s)"
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-add ~/.ssh/deploy_key

        # Trust the target host on first connect.
        printf 'Host *\n    StrictHostKeyChecking accept-new\n' > ~/.ssh/config
        chmod 600 ~/.ssh/config
        ssh-keyscan -p "$SERVER_PORT" "$SERVER_DOMAIN" >> ~/.ssh/known_hosts 2>/dev/null || true

        envoy run deploy \
          --branch="$DEPLOY_REF" \
          --domain="$APP_DOMAIN" \
          --unix_username="$UNIX_USERNAME" \
          --server_domain="$SERVER_DOMAIN" \
          --server_port="$SERVER_PORT" \
          --seed_database="$SEED_DATABASE"
