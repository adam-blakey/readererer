name: Deploy to production

# Publishing a GitHub release deploys to the `production` environment.
on:
  release:
    types: [published]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.APP_DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/envoy-deploy
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          unix-username: ${{ vars.UNIX_USERNAME }}
          server-domain: ${{ vars.SERVER_DOMAIN }}
          server-port: ${{ vars.SERVER_PORT }}
          app-domain: ${{ vars.APP_DOMAIN }}
          # Deploys main (which the release tag should point at), matching the
          # previous GitLab tag-triggered deploy. Envoy also fetches all tags.
          ref: main
          seed-database: "0"
