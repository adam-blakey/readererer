name: Deploy to QA

# Every push to main deploys automatically to the `qa` environment.
on:
  push:
    branches: [main]

# Serialise QA deploys; let an in-flight deploy finish before the next starts.
concurrency:
  group: deploy-qa
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: qa
      url: https://${{ vars.APP_DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/envoy-deploy
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          unix-username: ${{ vars.UNIX_USERNAME }}
          server-domain: ${{ vars.SERVER_DOMAIN }}
          server-port: ${{ vars.SERVER_PORT }}
          app-domain: ${{ vars.APP_DOMAIN }}
          ref: main
          seed-database: "0"
