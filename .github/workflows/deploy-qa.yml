name: Build QA image

# Every push to main builds a Docker image and pushes it to the GitHub
# Container Registry tagged `qa`. The QA server watches that tag and pulls
# it itself.
on:
  push:
    branches: [main]

concurrency:
  group: qa-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: qa
    steps:
      # Full history and tags so `git describe` can compute the version that
      # gets baked into the image (the footer's version number).
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version metadata
        id: version
        run: |
          {
            echo "tag=$(git describe --tags 2>/dev/null || true)"
            echo "hash=$(git log --pretty=%h -n1 HEAD)"
            echo "date=$(git log --pretty=%cI -n1 HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=qa
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION_TAG=${{ steps.version.outputs.tag }}
            APP_VERSION_HASH=${{ steps.version.outputs.hash }}
            APP_VERSION_DATE=${{ steps.version.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
