# PHP-specific security scanning, kept separate from the CodeQL analysis
# matrix (codeql.yml) so each scanner runs exactly once per trigger.
#
# NOTE: action inputs that have defaults (lock, format, ...) are intentionally
# not listed under `with:` — an explicitly empty value overrides the action's
# default and breaks the underlying tool ("unknown format").
name: "PHP Security"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '28 2 * * 2'

permissions:
  contents: read

jobs:
  dependency-check:
    name: Composer dependency vulnerabilities
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Checks composer.lock against the PHP Security Advisories Database.
    # The step (and therefore the job) fails when a known vulnerability is
    # found; the details are written to the job summary below.
    - name: Check composer.lock for known vulnerabilities
      id: security-check
      # You may pin to the exact commit or the version.
      # uses: symfonycorp/security-checker-action@258311ef7ac571f1310780ef3d79fc5abef642b5
      uses: symfonycorp/security-checker-action@v5

    - name: Report findings in the job summary
      if: always() && steps.security-check.outputs.vulns != ''
      env:
        VULNS: ${{ steps.security-check.outputs.vulns }}
      run: |
        {
          echo "## Composer dependency vulnerabilities"
          echo
          if [ "$(jq 'length' <<< "$VULNS")" = "0" ]; then
            echo ":white_check_mark: No known vulnerabilities found in composer.lock."
          else
            echo "| Package | Installed version | Advisory | CVE |"
            echo "| --- | --- | --- | --- |"
            jq -r '
              to_entries[]
              | .key as $package
              | .value.version as $version
              | .value.advisories[]
              | "| \($package) | \($version) | [\(.title)](\(.link)) | \(if (.cve // "") == "" then "—" else .cve end) |"
            ' <<< "$VULNS"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

  psalm:
    name: Psalm taint analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to upload SARIF results to code scanning.
      security-events: write
      # Only required for workflows in private repositories.
      actions: read
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # The psalm/psalm-github-security-scan Docker action is unmaintained and
    # ships PHP 8.2, which can no longer load this project's dependencies
    # (they require PHP >= 8.4), so run the same scan directly on PHP 8.4.
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        coverage: none
        tools: psalm

    - name: Install Composer dependencies
      run: composer install --no-scripts --no-progress

    - name: Run Psalm security scan
      run: psalm --output-format=github --taint-analysis --report=results.sarif

    # Findings appear under Security -> Code scanning, alongside the CodeQL
    # results from codeql.yml.
    - name: Upload SARIF results to code scanning
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: results.sarif
